<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Doctor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="doctor-edit-page">
    {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="flash-container">
      {% for category, message in messages %}
        <div class="flash-msg flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
  <div class="bg-overlay"></div>

  <div class="admin-edit-container">
    <div class="admin-edit-card">
      <div class="admin-edit-header">
        <h2>Edit Doctor</h2>
        <span class="admin-edit-subtitle">Update doctor details and profile information</span>
      </div>

      <form method="POST" action="{{ url_for('admin_edit_doctor', doctor_id=doctor.id) }}" class="admin-edit-form">
        <div class="form-row">
          <label for="full_name">Full name</label>
          <input type="text" id="full_name" name="full_name"
                 value="{{ doctor.full_name }}" required>
        </div>

        <div class="form-row">
          <label for="experience">Experience (years)</label>
          <input type="number" id="experience" name="experience" min="0"
                 value="{{ doctor.experience }}" required>
        </div>

        <div class="form-row">
          <label for="doctor_role">Speciality / Role</label>
          <input type="text" id="doctor_role" name="doctor_role"
                 value="{{ doctor.doctor_role or '' }}"
                 placeholder="e.g. Medical Oncologist">
        </div>

        <div class="form-row">
          <label for="doctor_qualifications">Qualifications</label>
          <input type="text" id="doctor_qualifications" name="doctor_qualifications"
                 value="{{ doctor.doctor_qualifications or '' }}"
                 placeholder="e.g. MBBS, DM - Medical Oncology">
        </div>

        <div class="form-row">
          <label for="bio">Short bio</label>
          <textarea id="bio" name="bio" rows="4"
                    placeholder="Brief summary of doctor’s experience and expertise">{{ doctor.bio or '' }}</textarea>
        </div>

        <div class="form-actions">
          <button type="submit" class="admin-btn admin-btn-primary">Save changes</button>
          <a href="{{ url_for('admin') }}" class="admin-btn admin-btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
