<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr detail card</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

</head>
<body class="doctor-detail-page">
   
  <div class="doctor-detail-card full-width">
    <div class="doctor-detail-content">
      <div class="doctor-photo">
        <img src="{{ url_for('static', filename='img/' ~ (doctor.photo_filename or 'profile_placeholder.png')) }}" alt="Doctor photo" />
      </div>
      <div class="doctor-info">
        <h2>Dr. {{doctor.full_name}}</h2>
        <div class="doctor-qual">{{doctor.doctor_qualifications}}</div>
        <div class="doctor-role">{{doctor.doctor_role}}</div>
        <div class="doctor-exp">
          With an experience of 
          <br><span>({{doctor.experience}} as specialist)</span>
        </div>
        <div class="doctor-bio">
          {{doctor.bio}}
        </div>
        <div class="doctor-actions">
             <a href="{{ url_for('dr_avail') }}" class="doctor-btn">check availability</a>
             <a href="{{ back_url }}" 
              class="doctor-btn secondary">
              Go Back
            </a>

        </div>
      </div>
    </div>

</div>


</body>
</html>
