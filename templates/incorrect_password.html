<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Incorrect Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS CDN (Optional for extra style) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            padding: 2.5rem 2rem;
            background: #fff;
            box-shadow: 0 2px 18px 2px rgba(198, 202, 205, .2);
            border-radius: 12px;
            text-align: center;
            max-width: 420px;
            width: 100%;
        }
        .error-icon {
            font-size: 3rem;
            color: #d32f2f;
        }
        .error-message {
            font-size: 1.3rem;
            color: #d32f2f;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }
        .back-link {
            color: #1565c0;
            text-decoration: underline;
            font-size: 1.1rem;
        }
        .back-link:hover {
            color: #0d47a1;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon">&#x1F512;</div>
        <div class="error-message">
            Incorrect password.<br>
            Please try again.
        </div>
        <a href="{{ url_for('login') }}" class="back-link">Back to Login</a>
    </div>
</body>
</html>
