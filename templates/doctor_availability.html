<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Doctor's Availability</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="doctor-availability-page">
    <div class="bg-overlay"></div>
  <section class="availability-card">
    <h2>Doctor's Availability</h2>
    <form class="availability-form"
      method="POST"
      action="{{ url_for('doctor_availability') }}">
  <table class="availability-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Morning</th>
        <th>Evening</th>
      </tr>
    </thead>
    <tbody>
      {% for d in days %}
      {% set av = availability_by_date.get(d) %}
      <tr>
        <td>
          {{ d.strftime('%d/%m/%Y') }}
          <input type="hidden" name="date_{{ loop.index0 }}" value="{{ d.isoformat() }}">
        </td>
        <td>
          <label class="slot {% if av and av.morning_available %}available{% else %}not-available{% endif %}">
            <input type="checkbox" name="morning_{{ loop.index0 }}"
                   {% if av and av.morning_available %}checked{% endif %}>
            08:00 - 12:00 am
          </label>
        </td>
        <td>
          <label class="slot {% if av and av.evening_available %}available{% else %}not-available{% endif %}">
            <input type="checkbox" name="evening_{{ loop.index0 }}"
                   {% if av and av.evening_available %}checked{% endif %}>
            04:00 - 9:00 pm
          </label>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  <div class="availability-footer">
    <button type="submit" class="save-btn">Save</button>
  </div>
</form>

  </section>
</body>
</html>
