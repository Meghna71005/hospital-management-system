<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile - MedAnchor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body class="patient-dashboard-page">
  <div class="bg-overlay"></div>

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card p-4">
          <h3 class="mb-3 text-center" style="color:#1977cc;">Edit Profile</h3>

          <form method="POST" action="{{ url_for('edit_profile') }}">
            <div class="mb-3">
              <label class="form-label">Username (cannot change)</label>
              <input type="text" class="form-control" value="{{ patient.username }}" disabled>
            </div>

            <div class="mb-3">
              <label for="full_name" class="form-label">Full Name</label>
              <input type="text" id="full_name" name="full_name"
                     class="form-control"
                     value="{{ patient.full_name or '' }}" required>
            </div>

            <div class="mb-3">
              <label for="contact" class="form-label">Contact Number</label>
              <input type="text" id="contact" name="contact"
                     class="form-control"
                     value="{{ patient.contact or '' }}" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">Save Changes</button>
            <a href="{{ url_for('patient', patient_id=patient.id) }}" class="btn btn-link w-100 mt-2">
              Cancel
            </a>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
