<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - MedAnchor</title>
  <link href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body class="login-page">
  <div class="auth-container">
    <div class="auth-form-area">
      <div class="auth-form">
        <h3 class="mb-3 text-center" style="color:#1977cc;">Forgot Password</h3>
        <p class="text-muted mb-4 text-center">Enter your username. The admin will help you reset your password.</p>
        <form method="POST" action="{{ url_for('forgot_password') }}">
          <div class="mb-3">
            <label for="fp-username" class="form-label">Username</label>
            <input type="text" name="username" id="fp-username" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Submit</button>
        </form>
        <div class="mt-3 text-center">
          <a href="{{ url_for('login') }}">Back to Login</a>
        </div>
      </div>
    </div>
    <div class="auth-image">
      <img src="{{ url_for('static', filename='img/dr_bg_login_reg.png') }}" alt="Doctor">
    </div>
  </div>
</body>
</html>
