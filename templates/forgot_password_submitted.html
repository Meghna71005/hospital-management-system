<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Password Request Received - MedAnchor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body class="login-page">
  <div class="auth-container">
    <!-- Left: message card -->
    <div class="auth-form-area">
      <div class="auth-form">
        <div class="text-center mb-4">
          <div class="d-flex justify-content-center align-items-center mb-4 logo-row">
            <img src="{{ url_for('static', filename='img/logo.png') }}"
                 alt="MedAnchor Logo"
                 class="auth-logo">
            <span class="auth-logo-text">MedAnchor</span>
          </div>
        </div>

        <h3 class="mb-2 text-center" style="color:#1977cc;">Request Submitted</h3>
        <p class="text-muted mb-4 text-center">
          If an account with username <strong>{{ username }}</strong> exists, the administrator will contact you to reset your password.
        </p>

        <div class="d-grid gap-2">
          <a href="{{ url_for('login') }}" class="btn btn-primary">Back to Login</a>
        </div>
      </div>
    </div>

    <!-- Right: image -->
    <div class="auth-image">
      <img src="{{ url_for('static', filename='img/dr_bg_login_reg.png') }}" alt="Doctor Welcome">
    </div>
  </div>

  <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>
</body>
</html>
